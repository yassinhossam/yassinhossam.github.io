<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Add<span>Courses</span></h1>
        <nav>
            <ul>
                <a href="index.html">Home |</a>
                <a href="courses.html">Courses |</a>
                <a href="add.html">Add courses |</a>
                <a href="contact.html">Contact Us</a>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <form>
                <div>
                    <label for="name course">Name Course</label><br>
                    <input required id="name course" type="text" placeholder="Name Course"><br>
                </div>
                <div>
                    <label for="instructor">Instructor</label><br>
                    <input required id="instructor" type="text" placeholder="Instructor"><br>
                </div>
                <div>
                    <label for="credit hours">Credit Hours</label><br>
                    <input required id="credit hours" type="number" placeholder="Credit Hours"><br>
                </div>
                <div>
                    <label for="note">Notes</label><br>
                    <textarea required id="note" placeholder="Add a note"></textarea><br>
                </div>
                <button type="submit">Add</button>
            </form>
        </section>
    </main>
    <footer>
        &copy; 2026 Yassin's<span>Courses</span>
    </footer>
</body>

</html>
